<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>F1 Race Strategy Simulator</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #F3F6F8;
            text-align: center;
            color: #1F1F1F;
        }

        h1 {
            color: #E10600;
            margin-top: 40px;
        }

        .container {
            width: 90%;
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        select, button {
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        button {
            background-color: #E10600;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #b80500;
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            background-color: #F7F5F2;
            display: none;
        }

        .position {
            font-size: 2rem;
            font-weight: bold;
            color: #E10600;
        }
    </style>
</head>

<body>

<nav style="background-color:#1F1F1F; padding:12px 0;">
    <div style="width:90%; max-width:700px; margin:0 auto; display:flex; justify-content:space-between; align-items:center;">

        <span style="color:#E10600; font-weight:bold; font-size:1.2rem;">
            🏁 F1 Simulator
        </span>

        <a href="index.html" 
           style="color:white; text-decoration:none; font-weight:500;">
            ← Back to Home
        </a>

    </div>
</nav>

<h1>F1 Race Strategy Simulator 🏁</h1>

<div class="container">

    <h3>Choose your race conditions</h3>

    <label>Weather:</label>
    <select id="weather">
        <option value="sunny">Sunny</option>
        <option value="rainy">Rainy</option>
    </select>
    <br>

    <label>Tire Strategy:</label>
    <select id="strategy">
        <option value="aggressive">Aggressive (Soft tires)</option>
        <option value="balanced">Balanced (Medium tires)</option>
        <option value="safe">Safe (Hard tires)</option>
    </select>
    <br>

    <label>Driver Style:</label>
    <select id="style">
        <option value="calm">Calm & Consistent</option>
        <option value="risky">Risk Taker</option>
    </select>

    <br><br>

    <button onclick="simulateRace()">Simulate Race</button>

    <div class="result" id="resultBox">
        <div class="position" id="position"></div>
        <p id="summary"></p>
    </div>

</div>

<script>
function simulateRace() {
    const weather = document.getElementById("weather").value;
    const strategy = document.getElementById("strategy").value;
    const style = document.getElementById("style").value;

    let score = 50;

    // Weather effects
    if (weather === "rainy") {
        score -= 10;
    } else {
        score += 5;
    }

    // Strategy effects
    if (strategy === "aggressive") {
        score += 10;
    } else if (strategy === "balanced") {
        score += 5;
    } else {
        score -= 5;
    }

    // Driver style effects
    if (style === "risky") {
        score += 10;
    } else {
        score += 5;
    }

    // Convert score to position
    let position;
    let message;

    if (score >= 65) {
        position = "P1 🏆";
        message = "Perfect strategy! You dominated the race with flawless execution.";
    } else if (score >= 55) {
        position = "P2 🥈";
        message = "Strong race! Just a few small decisions kept you from the win.";
    } else if (score >= 45) {
        position = "P4–P6";
        message = "Solid performance, but strategy could be improved in key moments.";
    } else {
        position = "P10+";
        message = "Tough race weekend. Strategy didn’t quite come together.";
    }

    document.getElementById("resultBox").style.display = "block";
    document.getElementById("position").innerText = position;
    document.getElementById("summary").innerText = message;
}
</script>

</body>
</html>
